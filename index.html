<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura Neural | Premium AI Real Estate Solutions</title>
    
    <meta name="description" content="Autonomous AI agents for high-performing Realtors.">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }

        .bg-glow { background: radial-gradient(circle at 50% -20%, #1e1b4b 0%, #05070a 100%); }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .gradient-text { background: linear-gradient(135deg, #818cf8 0%, #c084fc 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        /* DEV NOTE: This ensures the video covers the entire header background */
        .video-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; overflow: hidden; z-index: 0; }
        .video-container video { min-width: 100%; min-height: 100%; object-fit: cover; }
    </style>
</head>
<body class="bg-[#05070a] text-slate-300 bg-glow">

    <nav class="fixed w-full z-50 glass py-5 px-8">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="text-xl font-extrabold text-white tracking-tighter flex items-center gap-2 uppercase">
                <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center">A</div>
                Aura<span class="text-indigo-400">Neural</span>
            </div>
            <div class="hidden md:flex space-x-10 text-[11px] font-bold uppercase tracking-[0.2em] text-slate-400">
                <a href="#demo" class="hover:text-white transition">The Agent</a>
                <a href="#pricing" class="hover:text-white transition">Pricing</a>
            </div>
            <a href="#pricing" class="bg-indigo-600 text-white px-7 py-2.5 rounded-full text-xs font-bold uppercase hover:bg-indigo-500 transition shadow-lg">
                Book a Demo
            </a>
        </div>
    </nav>

    <header class="relative h-screen flex items-center justify-center overflow-hidden">
        <div class="video-container">
            <video autoplay loop muted playsinline poster="https://via.placeholder.com/1920x1080">
                <source src="your-video-file.mp4" type="video/mp4">
            </video>
            <div class="absolute inset-0 bg-gradient-to-b from-black/70 via-black/40 to-[#05070a]"></div>
        </div>

        <div class="relative z-10 text-center px-6 animate__animated animate__fadeIn">
            <span class="inline-block px-4 py-1.5 glass rounded-full text-indigo-400 text-[10px] font-bold uppercase tracking-[0.3em] mb-8">
                Autonomous Intelligence
            </span>
            <h1 class="text-6xl md:text-9xl font-extrabold text-white mb-8 leading-[0.9] tracking-tighter">
                The Future of <br><span class="gradient-text italic">Real Estate.</span>
            </h1>
            <div class="flex flex-col sm:flex-row justify-center gap-6 mt-12">
                <a href="#pricing" class="bg-white text-black px-12 py-5 rounded-2xl font-bold text-lg hover:bg-indigo-500 hover:text-white transition-all">
                    Deploy Agent
                </a>
                <a href="#demo" class="glass px-12 py-5 rounded-2xl text-white font-bold text-lg hover:bg-white/10 transition">
                    View Showcase
                </a>
            </div>
        </div>
    </header>

    <section id="demo" class="py-32 px-6">
        <div class="max-w-5xl mx-auto">
            <div class="text-center mb-16">
                <h2 class="text-4xl font-extrabold text-white mb-4">See Aura In Action</h2>
                <p class="text-slate-500">Watch how our agent handles a lead from initial inquiry to booking.</p>
            </div>
            
            <div class="glass p-4 rounded-[3rem] shadow-2xl shadow-indigo-500/10">
                <div class="relative rounded-[2rem] overflow-hidden aspect-video bg-black">
                    <video controls class="w-full h-full">
                        <source src="your-demo-video.mp4" type="video/mp4">
                        Your browser does not support the video tag.
                    </video>
                </div>
            </div>
        </div>
    </section>

    ...

</body>
</html>
